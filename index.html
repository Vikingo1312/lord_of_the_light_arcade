<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>KEANO ROMEO — LORD OF THE LIGHT I ⚔️ (V2.0 ENGINE)</title>
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- iOS PWA Fullscreen -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lord of the Light">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600;700&family=Press+Start+2P&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Press Start 2P', monospace;
            color: white;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        /* The main WebGL/2D Canvas */
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: url('assets/UI/UX_Cosmic_Shimmer.png') center/cover no-repeat;
        }

        /* Essential Utility Classes */
        .hidden {
            display: none !important;
        }

        .neon-text {
            text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor;
        }
    </style>
</head>

<body>
    <div id="game-container">
        <!-- V2.0 Canvas holds the entire render pipeline -->
        <canvas id="gameCanvas"></canvas>

        <!-- Mobile Hamburger Menu (touch devices only) -->
        <div id="mobile-menu-btn" style="
            display: none;
            position: fixed; top: 12px; right: 12px; z-index: 9999;
            width: 44px; height: 44px;
            background: rgba(15,18,25,0.85);
            border: 2px solid rgba(0,212,255,0.4);
            border-radius: 10px;
            cursor: pointer;
            align-items: center; justify-content: center;
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
        " ontouchstart="document.getElementById('mobile-menu').classList.toggle('hidden')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <rect y="3" width="24" height="3" rx="1.5" fill="#00d4ff" />
                <rect y="10" width="18" height="3" rx="1.5" fill="#00d4ff" />
                <rect y="17" width="24" height="3" rx="1.5" fill="#00d4ff" />
            </svg>
        </div>

        <div id="mobile-menu" class="hidden" style="
            position: fixed; top: 60px; right: 12px; z-index: 9998;
            background: rgba(10,12,20,0.92);
            border: 2px solid rgba(0,212,255,0.3);
            border-radius: 12px;
            padding: 8px 0;
            min-width: 180px;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        ">
            <div class="mmenu-item" onclick="
                if(document.fullscreenElement){document.exitFullscreen()}else{document.documentElement.requestFullscreen().catch(()=>{})}
                document.getElementById('mobile-menu').classList.add('hidden');
            " style="padding:14px 20px;color:#00d4ff;font:bold 14px 'Press Start 2P';cursor:pointer;">⛶ FULLSCREEN
            </div>
            <div class="mmenu-item" onclick="
                const am=window.__gameRef?.audioManager;
                if(am){am.bgm&&(am.bgm.muted=!am.bgm.muted)}
                document.getElementById('mobile-menu').classList.add('hidden');
            " style="padding:14px 20px;color:#ffcc00;font:bold 14px 'Press Start 2P';cursor:pointer;">🔇 MUTE</div>
            <div class="mmenu-item" onclick="
                window.__gameRef?.stateManager?.switchState('Menu');
                document.getElementById('mobile-menu').classList.add('hidden');
            " style="padding:14px 20px;color:#ff4444;font:bold 14px 'Press Start 2P';cursor:pointer;">🏠 MENU</div>
        </div>
    </div>

    <!-- ES6 Modules Entry Point -->
    <script type="module" src="js/main.js?v=2.02"></script>

    <script>
        // Show hamburger menu only on touch devices
        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            document.getElementById('mobile-menu-btn').style.display = 'flex';
        }
        // iOS Safari: scroll to hide address bar
        window.addEventListener('load', () => {
            setTimeout(() => window.scrollTo(0, 1), 100);
        });
    </script>
</body>

</html>
