<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>KEANO ROMEO — LORD OF THE LIGHT I ⚔️ (V2.0 ENGINE)</title>
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600;700&family=Press+Start+2P&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Press Start 2P', monospace;
            color: white;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        /* The main WebGL/2D Canvas */
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: url('assets/UI/UX_Cosmic_Shimmer.png') center/cover no-repeat;
        }

        /* Essential Utility Classes */
        .hidden {
            display: none !important;
        }

        .neon-text {
            text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor;
        }
    </style>
</head>

<body>
    <div id="game-container">
        <!-- V2.0 Canvas holds the entire render pipeline -->
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- ES6 Modules Entry Point -->
    <script type="module" src="js/main.js?v=2.01"></script>
</body>

</html>
